*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#eef0ec;display:flex;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
#map{position:absolute;inset:0;height:100%;width:100%;z-index:1;background:#eef2f7}
#sb{width:322px;min-width:322px;height:100vh;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden;z-index:1000;box-shadow:2px 0 16px rgba(0,0,0,.07);position:relative}
#sbh{padding:18px 18px 13px;border-bottom:1px solid #f0f0f0}
.tt{font-size:15px;font-weight:700;color:#111827}.su{font-size:11px;color:#9ca3af;margin-top:3px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:11px 13px;border-bottom:1px solid #f0f0f0}
.st{background:#f9fafb;border-radius:8px;padding:7px 10px}.st .l{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.4px}.st .v{font-size:17px;font-weight:700;margin-top:1px}
#days{flex:1;overflow-y:auto;padding:9px;-webkit-overflow-scrolling:touch}#days::-webkit-scrollbar{width:3px}#days::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:4px}
.day{border-radius:11px;border:1.5px solid #f0f0f0;margin-bottom:7px;background:#fff;overflow:hidden;transition:border-color .12s}
.day.active{border-color:var(--dc)}
.dh{padding:12px 13px;cursor:pointer;display:flex;align-items:center;gap:9px}
.dh .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}.dh .nm{font-size:13px;font-weight:600;color:#111827}.dh .dt{font-size:11px;color:#9ca3af;margin-left:auto}
.db{padding:0 13px 11px;display:none}.day.active .db{display:block}
.dm{display:flex;gap:6px;margin:2px 0 9px}.mb{font-size:10px;padding:2px 8px;border-radius:20px;background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb}
.stop{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:12px;color:#374151;line-height:1.4}.stop .ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}.stop .sn{font-weight:500}.stop .sd{color:#9ca3af;font-size:11px}
.dn{margin-top:8px;padding-top:8px;border-top:1px solid #f3f4f6;font-size:11.5px;color:#6b7280;line-height:1.6}
#ly{padding:9px 11px;border-top:1px solid #f0f0f0;display:flex;gap:5px}
.lb{flex:1;padding:8px 3px;font-size:11px;border-radius:7px;background:#f9fafb;border:1px solid #e5e7eb;color:#6b7280;cursor:pointer}.lb.active{background:#eff6ff;border-color:#93c5fd;color:#2563eb;font-weight:600}
.leaflet-popup-content-wrapper{background:#fff!important;border:1px solid #e5e7eb!important;border-radius:12px!important}.leaflet-popup-tip{background:#fff!important}.leaflet-popup-content{margin:11px 13px!important}
.pt{font-size:13px;font-weight:700;margin-bottom:2px}.pi{font-size:11px;color:#6b7280;line-height:1.5}
#leg{position:absolute;bottom:22px;right:14px;z-index:800;background:rgba(255,255,255,.97);border:1px solid #e5e7eb;border-radius:12px;padding:10px 13px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.lr{display:flex;align-items:center;gap:7px;font-size:11px;color:#6b7280;margin-bottom:4px}.lr:last-child{margin-bottom:0}.lr .e{font-size:14px;width:18px;text-align:center}
#grab{display:none}
@media (max-width:760px){
 body{flex-direction:column}
 #leg{bottom:auto;top:calc(env(safe-area-inset-top) + 10px);right:10px;padding:8px 10px;transform:scale(.9);transform-origin:top right}
 #sb{position:fixed;left:0;right:0;bottom:0;top:auto;width:100%;min-width:0;height:auto;max-height:82vh;border-right:none;border-top:1px solid #e5e7eb;border-radius:18px 18px 0 0;box-shadow:0 -6px 24px rgba(0,0,0,.16);z-index:1500;transform:translateY(calc(100% - 136px));transition:transform .3s cubic-bezier(.4,0,.2,1);padding-bottom:env(safe-area-inset-bottom)}
 #sb.open{transform:translateY(0)}
 #grab{display:block;width:100%;padding:9px 0 4px;flex-shrink:0}#grab .bar{width:38px;height:4px;border-radius:3px;background:#d1d5db;margin:0 auto}
 #sbh{padding:2px 16px 12px;cursor:pointer}
 .tt{font-size:16px}.su{font-size:12px}
 #days{max-height:48vh;padding:9px 11px}
 .dh{padding:14px 13px}.dh .nm{font-size:14px}
 .lb{padding:12px 3px;font-size:12px}
 .stop{padding:7px 0;font-size:13px}.stop .sd{font-size:12px}.dn{font-size:12.5px}.mb{font-size:11px;padding:3px 9px}
}

const COL=['#6366f1','#10b981','#8b5cf6','#f59e0b','#ef4444','#0ea5e9','#ec4899'];
const ICON={sleep:'🌙',lunch:'🍴',swim:'🏊',base:'⚓'};
const isTouch = window.matchMedia('(max-width:760px)').matches;

function renderPanel(){
  let tot=0; Object.keys(DATA.routes).forEach(d=>tot+=DATA.routes[d].nm);
  document.getElementById('tnm').textContent=Math.round(tot)+' nm';
  document.getElementById('th').textContent='~'+(tot/7).toFixed(0)+'h';
  const de=document.getElementById('days');
  DATA.dayinfo.forEach(info=>{
    const d=info.day,col=COL[d-1];
    const stops=DATA.stops.filter(p=>p.day===d);
    const km=DATA.routes[d];
    const el=document.createElement('div');el.className='day';el.style.setProperty('--dc',col);el.dataset.day=d;
    el.innerHTML='<div class="dh"><div class="dot" style="background:'+col+'"></div><span class="nm">Dia '+d+' · '+info.title+'</span><span class="dt">'+info.date+'</span></div>'+
      '<div class="db"><div class="dm"><span class="mb">'+(km?km.nm+' nm':'')+'</span><span class="mb">'+(km?(km.nm/7).toFixed(1)+'h a 7kn':'')+'</span></div>'+
      stops.map(s=>'<div class="stop"><span class="ico">'+(ICON[s.kind]||'📍')+'</span><span><span class="sn">'+s.n+'</span> <span class="sd">· '+s.d+'</span></span></div>').join('')+
      '<div class="dn">'+info.note+'</div></div>';
    el.querySelector('.dh').addEventListener('click',()=>onDay(d,el));
    de.appendChild(el);
  });
}

let map=null,lines={},act=null;
function initMap(){
  if(typeof L==='undefined'){ throw new Error('Leaflet KO'); }
  map=L.map('map',{zoomControl:!isTouch}).setView([38.47,20.74],isTouch?9:10);
  if(!isTouch) L.control.zoom({position:'bottomleft'}).addTo(map);
  const TL={
    sat:L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:18,attribution:'© Esri'}),
    light:L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© CartoDB'})
  };
  TL.sat.addTo(map);let nov=null;
  window.setL=function(n){if(nov){map.removeLayer(nov);nov=null}Object.values(TL).forEach(l=>{try{map.removeLayer(l)}catch(e){}});if(n==='naut'){TL.light.addTo(map);nov=L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png',{maxZoom:18,opacity:.9});nov.addTo(map)}else TL[n].addTo(map);document.querySelectorAll('.lb').forEach(b=>b.classList.remove('active'));document.getElementById('lb-'+n).classList.add('active')};
  Object.keys(DATA.routes).forEach(d=>{lines[d]=L.polyline(DATA.routes[d].path,{color:COL[d-1],weight:isTouch?5:4.5,opacity:.9,lineJoin:'round',lineCap:'round'}).addTo(map)});
  DATA.stops.forEach(p=>{
    const col=p.kind==='base'?'#f97316':COL[p.day-1];const em=ICON[p.kind];const sz=isTouch?34:30;
    const m=L.marker([p.lat,p.lng],{zIndexOffset:100,icon:L.divIcon({className:'dmk',html:'<div style="background:'+col+';width:'+sz+'px;height:'+sz+'px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:'+(sz/2)+'px;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">'+em+'</div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]})});
    m.bindPopup('<div class="pt" style="color:'+col+'">'+p.n+'</div><div class="pi">'+p.d+'</div>');m.addTo(map);
  });
  styleLines();fixSize();
}
function styleLines(){if(!map)return;Object.keys(DATA.routes).forEach(d=>{lines[d].setStyle({weight:(+d===act)?7:(isTouch?5:4.5),opacity:act===null?.9:((+d===act)?1:.15)})})}
function fixSize(){if(map){const mp=document.getElementById('map');mp.style.height=window.innerHeight+'px';map.invalidateSize()}}

function onDay(d,el){
  act=act===d?null:d;
  document.querySelectorAll('.day').forEach(x=>x.classList.remove('active'));
  if(act!==null){
    el.classList.add('active');
    if(isTouch) document.getElementById('sb').classList.add('open');
    if(map){const pad=isTouch?[30,30]:[70,70];try{map.flyToBounds(L.latLngBounds(DATA.routes[d].path),{padding:pad,duration:.9,maxZoom:13});}catch(e){}}
  } else if(map){ map.flyTo([38.47,20.74],isTouch?9:10,{duration:.7}); }
  styleLines();
}

function initSheet(){
  const sb=document.getElementById('sb'),grab=document.getElementById('grab'),sbh=document.getElementById('sbh');
  const toggle=()=>sb.classList.toggle('open');
  grab.addEventListener('click',toggle);
  sbh.addEventListener('click',()=>{if(isTouch)toggle()});
  let sy=null,so=false;
  const ts=e=>{sy=e.touches[0].clientY;so=sb.classList.contains('open')};
  const tm=e=>{if(sy===null)return;const dy=e.touches[0].clientY-sy;if(so&&dy>60){sb.classList.remove('open');sy=null}else if(!so&&dy<-40){sb.classList.add('open');sy=null}};
  const te=()=>{sy=null};
  [grab,sbh].forEach(elx=>{elx.addEventListener('touchstart',ts,{passive:true});elx.addEventListener('touchmove',tm,{passive:true});elx.addEventListener('touchend',te)});
}

renderPanel();
initSheet();
try{ initMap(); }
catch(err){
  const mp=document.getElementById('map');
  mp.innerHTML='<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;color:#6b7280;background:#eef2f7">'+
    '<div style="font-size:40px;margin-bottom:12px">🛰️</div>'+
    '<div style="font-size:15px;font-weight:600;color:#111827;margin-bottom:6px">El mapa necessita internet</div>'+
    '<div style="font-size:13px;line-height:1.6;max-width:300px">Activa el WiFi o les dades mòbils i torna a obrir la pàgina. La info dels dies (a sota) funciona sense connexió.</div></div>';
  mp.style.height=window.innerHeight+'px';
  if(isTouch) document.getElementById('sb').classList.add('open');
}
window.addEventListener('resize',fixSize);
window.addEventListener('orientationchange',()=>setTimeout(fixSize,300));
setTimeout(fixSize,300);
